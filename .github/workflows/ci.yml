name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # The point of this matrix is the *sandbox*, not the code.
  #
  # The seccomp allowlist is a list of syscalls the C library happens to issue,
  # and that varies by libc and version in ways nothing in our source reveals:
  # `fork()` reaches the kernel as `clone3` on newer glibc and `clone` on older
  # and on musl; `fstat()` reaches it as `newfstatat` on glibc 2.36 but `fstat`
  # on 2.39; the child calls `set_robust_list` before any of our code runs. Each
  # of those, when missing, kills a renderer with SIGSYS and surfaces to the
  # engine as TabCrashed — a symptom that points at the transport rather than
  # the sandbox.
  #
  # Two of those were found by running this suite under a libc other than the
  # developer's, and would not have been found any other way. That is what this
  # job is for.
  #
  # The aarch64 row extends it from libc to *architecture*: the seccomp target
  # arch, the raw syscall numbers, the SIGSYS reporter's `si_syscall` offset in
  # `siginfo_t`, and the fork path (aarch64 has no `SYS_fork` at all, so glibc
  # and musl both reach `clone`/`clone3`) are all arch-specific and only ever
  # *run* — as opposed to type-checked by `cross-compile` — here. It needs an
  # arm64 runner, which GitHub provides free for public repos
  # (`ubuntu-24.04-arm`); on a private repo it requires the paid arm runners.
  linux-libc-matrix:
    name: linux (${{ matrix.name }})
    runs-on: ${{ matrix.runs-on || 'ubuntu-latest' }}
    # A cap, not a budget: these finish in well under a minute. The default is
    # 360, and the first run of this workflow spent hours on a wedged musl job
    # before it was cancelled by hand. A hang should cost minutes and report.
    timeout-minutes: 15
    container:
      image: ${{ matrix.image }}
      # Docker's default seccomp profile denies unshare(CLONE_NEWUSER), which
      # `isolate_network` needs. It is fail-closed, so without this every spawn
      # fails with EPERM and the whole suite collapses for a reason that has
      # nothing to do with the code under test. Note this opts the *container*
      # out of Docker's filter — it does not weaken the filters this project
      # installs, which are what the tests actually exercise.
      options: --security-opt seccomp=unconfined --security-opt apparmor=unconfined
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64: three libcs (default runner).
          - name: glibc 2.36 x86_64 (debian bookworm)
            image: rust:1-bookworm
          - name: glibc 2.39 x86_64 (debian trixie)
            image: rust:1-trixie
          - name: musl x86_64 (alpine)
            image: rust:1-alpine
            setup: apk add --no-cache musl-dev
          # aarch64: a native arm64 runner, so the arch-specific sandbox paths
          # are enforced by a real kernel (qemu-user would not faithfully apply
          # guest seccomp). The multi-arch `rust:1-trixie` image resolves to its
          # arm64 variant automatically here.
          #
          # glibc only, deliberately: a musl/arm64 row is *not* worth it. First,
          # it adds no unique coverage — aarch64 has no `SYS_fork` for any libc,
          # so musl-on-arm reaches `clone`/`clone3` exactly as glibc-on-arm does,
          # and the musl-specific quirks (`set_tid_address`, the `F_SETFD` after
          # `F_DUPFD_CLOEXEC`) are already exercised by the musl-x86 row. Second,
          # `actions/checkout` cannot even run in an Alpine/arm64 container:
          # GitHub injects a glibc-linked Node.js that will not execute on musl,
          # so the job dies at checkout before any test runs. Arch coverage comes
          # from glibc-arm here; musl coverage from musl-x86 above.
          - name: glibc 2.39 aarch64 (debian trixie)
            image: rust:1-trixie
            runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Report the libc actually in use
        # Printed for the log, not asserted: when a sandbox test fails here,
        # this line is the first thing worth looking at.
        run: ldd --version | head -1 || true

      - name: Test
        run: cargo test --all-targets

      # The probe inventory is asserted per-platform inside the suite, but a
      # count in the log makes an accidental shrink visible at a glance.
      - name: Report sandbox probe coverage
        run: |
          echo "probes compiled in:"
          cargo run --quiet -- selftest list

  # Every combination that must keep compiling. Cheap, and it is what catches
  # portability breaks in code no single platform exercises — musl not having
  # glibc's `__rlimit_resource_t`, for instance, made the crate uncompilable on
  # Alpine while every Linux test on the developer's machine passed.
  cross-compile:
    name: check (${{ matrix.target }}${{ matrix.features && ' single-process' }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, features: --no-default-features }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin, features: --no-default-features }
          # Windows installs process mitigation policies but not the
          # parent-side access confinement. See src/sandbox/windows.rs.
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, features: --no-default-features }
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add ${{ matrix.target }}
      - run: cargo check --all-targets --target ${{ matrix.target }} ${{ matrix.features }}

  # The platforms whose sandbox backend can actually be *run*, rather than only
  # type-checked. All three now carry probes; the suite's inventory guard
  # asserts the expected set per platform, so a backend losing its coverage to
  # a `cfg` fails here instead of passing quietly.
  native-tests:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --all-targets

  # Build and briefly run each fuzz target. The point is to keep the harness (and
  # the untrusted-input parsers it covers — the image decoder, the broker's IPC
  # deserialization, the SSRF URL parser) from bit-rotting, and to surface a new
  # *shallow* crash as a red build. This is a smoke test, not a campaign: a few
  # seconds per target finds a broken build or an immediate panic, not a deep
  # bug. A real campaign belongs in a scheduled job with a persisted corpus.
  fuzz-smoke:
    name: fuzz (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      # cargo-fuzz targets are `#![no_main]` libFuzzer binaries and need nightly.
      - uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run each target briefly
        run: |
          for target in decode_image ipc_frame ssrf_url; do
            echo "=== $target ==="
            cargo fuzz run "$target" -- -max_total_time=30 -print_final_stats=1
          done

  # Advisory, deliberately: the tree is not currently clean under either tool.
  # There is no rustfmt.toml and the code is written wider than default rustfmt
  # wants, so `--check` demands a whole-repo reformat; clippy has ~10 pre-existing
  # style nits. Gating on those would make this workflow red on its first run for
  # reasons unrelated to what it exists to test, and would pressure a large
  # unrelated diff. Flip `continue-on-error` off once the tree is clean and, for
  # fmt, once a rustfmt.toml pins the style the code actually uses.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt clippy
      - run: cargo fmt --check
        continue-on-error: true
      - run: cargo clippy --all-targets
        continue-on-error: true
